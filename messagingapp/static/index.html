<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message App</title>
<style>
  :root {
    --bg:        #14161a;
    --panel:     #1c1f26;
    --panel-alt: #23262f;
    --border:    #2e323d;
    --text:      #e7e9ee;
    --text-dim:  #8b93a3;
    --accent:    #4f8cff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* ===== window frame, standing in for MainWindow (800x600) ===== */
  .window {
    width: 800px;
    max-width: 100%;
    height: 600px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    padding: 20px 50px;
    gap: 24px;
    overflow: hidden;
  }

  /* ===== formLayoutWidget_2 -> "Your Username:" row ===== */
  .username-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 331px;
    max-width: 100%;
  }

  .username-row label {
    font-size: 0.85rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .username-row input {
    flex: 1;
    padding: 0.4rem 0.6rem;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.9rem;
  }

  /* ===== formLayoutWidget -> messageTable (username / text row) ===== */
  .message-table {
    flex: 1;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-y: auto;
  }

  .message-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .message-row:last-child { border-bottom: none; }

  .message-row .field-label {
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .message-row .field-value {
    padding: 0.4rem 0.6rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  /* ===== bottom row: messageField (QTextEdit) + sendMessage (QPushButton) ===== */
  .composer-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .composer-row textarea {
    flex: 1;
    resize: none;
    height: 70px;
    padding: 0.6rem 0.7rem;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  .composer-row button {
    width: 111px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }

  .composer-row button:hover { filter: brightness(1.1); }
</style>
</head>
<body>

  <div class="window">

    <!-- formLayoutWidget_2 / UsernameFeld -->
    <div class="username-row">
      <label for="username_label">Your Username:</label>
      <input type="text" id="username_label" placeholder="Enter your username">
    </div>

    <!-- formLayoutWidget / messageTable -->
    <div class="message-table" id="messageTable">
      <div class="message-row">
        <span class="field-label">Username</span>
        <span class="field-value" id="userText">Text</span>
      </div>
    </div>

    <!-- messageField + sendMessage -->
    <div class="composer-row">
      <textarea id="messageField" placeholder="Type a message…"></textarea>
      <button id="sendMessage">Send Message</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
